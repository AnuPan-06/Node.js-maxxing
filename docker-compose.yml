version: '3.8'

services:
  
  mongodb:
    image: mongo:latest
    container_name: physics-db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo-data:/data/db 

  mysql-db:
    image: mysql:8.0
    container_name: mysql-container
    ports:
      - "3306:3306" 
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD} 
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: . 
    container_name: physics-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb 
      - mysql-db



volumes:
  mongo-data: 
  mysql_data:
    
