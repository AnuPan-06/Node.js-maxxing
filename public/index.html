<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Calculator - Circle Area</title>
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า Google Fonts (คลาสสิกและอ่านง่าย) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- หัวข้อหลัก -->
        <div class="text-center">
            <h1 class="text-sm font-bold tracking-widest text-red-500 uppercase mb-2">CHECK UPDATE</h1>
            <h2 class="text-4xl font-extrabold text-gray-900">คำนวณพื้นที่วงกลม 🧪</h2>
            <p class="text-gray-500 mt-2">บันทึกประวัติการคำนวณลง MongoDB อัตโนมัติ</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            
            <!-- ส่วนที่ 1: ฟอร์มคำนวณ -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 h-fit">
                <h3 class="text-xl font-bold text-gray-800 mb-6">เครื่องคำนวณ</h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">ใส่รัศมีวงกลม (Radius)</label>
                        <input type="number" id="radiusInput" placeholder="ตัวอย่าง: 5"
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>

                    <button onclick="sendData()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                        คำนวณและบันทึกข้อมูล
                    </button>

                    <!-- พื้นที่แสดงผลลัพธ์ -->
                    <div id="resultDisplay" class="mt-4 p-4 rounded-xl bg-gray-50 text-center font-semibold text-gray-700 border border-dashed border-gray-300">
                        ผลลัพธ์จะปรากฏที่นี่
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 2: ประวัติการคำนวณ -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800">ประวัติการคำนวณ</h3>
                    <button onclick="getHistory()" class="text-sm text-blue-600 hover:underline font-medium">
                        🔄 รีเฟรชประวัติ
                    </button>
                </div>

                <div id="historyDisplay" class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                    <p class="text-gray-400 text-center py-10">ยังไม่มีข้อมูลประวัติ</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function sendData() {
            const input = document.getElementById('radiusInput');
            const r = input.value;
            const display = document.getElementById('resultDisplay');

            // 1. ดัก Error: ถ้าค่าว่าง หรือ น้อยกว่าหรือเท่ากับ 0
            if (r === "" || r <= 0) {
                display.classList.remove('bg-gray-50', 'text-gray-700', 'bg-green-50', 'text-green-700');
                display.classList.add('bg-red-50', 'text-red-600');
                display.innerText = "❌ กรุณาใส่ตัวเลขที่มากกว่า 0 ครับ";
                input.focus();
                return;
            }

            // แสดงสถานะกำลังโหลด
            display.classList.remove('bg-red-50', 'text-red-600');
            display.classList.add('bg-gray-50', 'text-gray-700');
            display.innerText = "⏳ กำลังคำนวณ...";

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ radius: parseFloat(r) })
                });

                const data = await response.json();
                
                display.classList.replace('bg-gray-50', 'bg-green-50');
                display.classList.replace('text-gray-700', 'text-green-700');
                display.innerHTML = `พื้นที่วงกลมคือ: <span class="text-2xl block font-bold">${data.result.toFixed(2)}</span>`;
                
                // หลังจากคำนวณเสร็จ ให้ดึงประวัติใหม่ทันที
                getHistory();
            } catch (error) {
                display.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อกับ Server";
            }
        }

        async function getHistory() {
            try {
                const response = await fetch('/api/history');
                const logs = await response.json();
                const historyDiv = document.getElementById('historyDisplay');
                
                if (logs.length === 0) {
                    historyDiv.innerHTML = '<p class="text-gray-400 text-center py-10">ยังไม่มีข้อมูลประวัติ</p>';
                    return;
                }

                let html = "";
                logs.forEach(log => {
                    const date = new Date(log.createdAt).toLocaleString('th-TH');
                    html += `
                        <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 flex justify-between items-center hover:shadow-md transition-shadow">
                            <div>
                                <p class="text-xs text-gray-400 uppercase font-bold tracking-tight">รัศมี: ${log.radius}</p>
                                <p class="text-[10px] text-gray-400">${date}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-blue-600">${log.result.toFixed(2)}</p>
                                <p class="text-[10px] text-gray-300">ตารางหน่วย</p>
                            </div>
                        </div>
                    `;
                });
                
                historyDiv.innerHTML = html;
            } catch (error) {
                console.error("Error fetching history:", error);
            }
        }

        // เรียกประวัติขึ้นมาโชว์ตั้งแต่ตอนโหลดหน้าเว็บ
        getHistory();
    </script>

</body>
</html>
